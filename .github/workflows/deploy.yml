name: Auto-Deploy to Germany
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/ai-trading
            git pull
            echo "${{ secrets.ENV_FILE }}" > .env
            npm install
            npm run build
            pm2 restart mon-cheri-quantum || pm2 start "npm start" --name "mon-cheri-quantum"
            pm2 save
